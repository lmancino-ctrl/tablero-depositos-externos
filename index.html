<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablero Depósitos Externos · Cold Land</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background:#020617; margin:0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

const APPSSCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbxeNyHR9IDnjHJnJh3rkSyFaFNL-RlbyTTDXz_PK58dYj4jnCgs-qyRuBIAyTy1Et_76g/exec";

const KG_ALERT_THRESHOLD = 3;

// ---------- helpers ----------
const num = (v) => {
  const n = typeof v === "number" ? v : parseFloat(v);
  return isNaN(n) ? 0 : n;
};
const fmtInt = (n) =>
  n === null || n === undefined || isNaN(n) ? "—" : Math.round(n).toLocaleString("es-AR");
const fmtKg = (n) =>
  n === null || n === undefined || isNaN(n)
    ? "—"
    : n.toLocaleString("es-AR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
const cls = (...a) => a.filter(Boolean).join(" ");

function normRemitoRow(r) {
  return {
    remito: String(r["Remito"] ?? "").trim(),
    codbar: String(r["CodBar"] ?? "").trim(),
    pallet: String(r["Pallet"] ?? "").trim(),
    tara: num(r["Tara"]),
    neto: num(r["Neto"]),
    bruto: num(r["Bruto"]),
    codigo: String(r["Código"] ?? "").trim(),
    producto: String(r["Producto"] ?? "").trim(),
    fechaSalida: r["Fecha de salida"] || r["Fecha de Salida"] || "",
  };
}

function buildRemitoTree(rows) {
  const remitos = new Map();
  (rows || []).forEach((raw) => {
    const r = normRemitoRow(raw);
    if (!r.remito) return;
    if (!remitos.has(r.remito)) {
      remitos.set(r.remito, {
        remito: r.remito,
        fechaSalida: r.fechaSalida,
        pallets: new Map(),
        productos: new Map(),
        totalCajas: 0,
        totalKg: 0,
      });
    }
    const rem = remitos.get(r.remito);
    rem.totalCajas += 1;
    rem.totalKg += r.neto;

    if (!rem.pallets.has(r.pallet)) {
      rem.pallets.set(r.pallet, {
        pallet: r.pallet,
        cajas: [],
        cajasEnviadas: 0,
        kgEnviados: 0,
        productos: new Set(),
      });
    }
    const pal = rem.pallets.get(r.pallet);
    pal.cajas.push(r);
    pal.cajasEnviadas += 1;
    pal.kgEnviados += r.neto;
    pal.productos.add(r.codigo + " · " + r.producto);

    if (!rem.productos.has(r.codigo)) {
      rem.productos.set(r.codigo, { codigo: r.codigo, producto: r.producto, cajas: 0, kg: 0 });
    }
    const p = rem.productos.get(r.codigo);
    p.cajas += 1;
    p.kg += r.neto;
  });
  return remitos;
}

function buildConfirmMap(confirmaciones) {
  const map = new Map();
  (confirmaciones || []).forEach((c) => {
    const pallet = String(c["Pallet"] ?? "").trim();
    if (!pallet) return;
    map.set(pallet, {
      pallet,
      estado: c["Estado"] || "Confirmado",
      cajasEnviadas: num(c["Cajas Enviadas"]),
      cajasRecibidas: num(c["Cajas Recibidas"]),
      kgEnviados: num(c["Kg Enviados"]),
      kgRecibidas: num(c["Kg Recibidos"]),
      fecha: c["Fecha Confirmación"] || "",
    });
  });
  return map;
}

function buildColdLandMap(rows) {
  const map = new Map();
  (rows || []).forEach((r) => {
    const pallet = String(r["ETIQ AZUL"] ?? "").trim();
    if (!pallet) return;
    const cur = map.get(pallet) || { pallet, cajas: 0, remito: r["REMITO"] || "", producto: r["PRODUCTO"] || "" };
    cur.cajas += num(r["CANTIDAD"]);
    map.set(pallet, cur);
  });
  return map;
}

function buildAnbMap(rows) {
  const map = new Map();
  (rows || []).forEach((r) => {
    const pallet = String(r["PALLET"] ?? "").trim();
    if (!pallet) return;
    const cur =
      map.get(pallet) || { pallet, cajas: 0, kg: 0, codigo: r["CODIGO"] || "", producto: r["DESCRIPCION"] || "" };
    cur.cajas += num(r["CAJAS"]);
    cur.kg += num(r["kg"]);
    map.set(pallet, cur);
  });
  return map;
}

// ---------- iconos (SVG simples, sin dependencias) ----------
function Icon({ name, size = 16, className = "" }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className };
  switch (name) {
    case "refresh": return <svg {...p}><path d="M21 12a9 9 0 1 1-3-6.7" /><path d="M21 3v6h-6" /></svg>;
    case "chevron-right": return <svg {...p}><path d="M9 18l6-6-6-6" /></svg>;
    case "chevron-down": return <svg {...p}><path d="M6 9l6 6 6-6" /></svg>;
    case "check": return <svg {...p}><path d="M20 6L9 17l-5-5" /></svg>;
    case "clock": return <svg {...p}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 3" /></svg>;
    case "alert": return <svg {...p}><path d="M10.3 3.9L2.7 17a1.8 1.8 0 0 0 1.5 2.7h15.6a1.8 1.8 0 0 0 1.5-2.7L13.7 3.9a1.8 1.8 0 0 0-3.4 0Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></svg>;
    case "package": return <svg {...p}><path d="M21 8l-9-5-9 5 9 5 9-5Z" /><path d="M3 8v8l9 5 9-5V8" /><path d="M12 13v8" /></svg>;
    case "truck": return <svg {...p}><path d="M3 16V6a1 1 0 0 1 1-1h9v11" /><path d="M13 9h4l3 3v4h-7" /><circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" /></svg>;
    case "warehouse": return <svg {...p}><path d="M3 21V10l9-6 9 6v11" /><path d="M9 21v-6h6v6" /></svg>;
    case "clipboard": return <svg {...p}><rect x="6" y="4" width="12" height="16" rx="2" /><path d="M9 4V2h6v2" /><path d="M9 11h6" /><path d="M9 15h6" /></svg>;
    case "dashboard": return <svg {...p}><rect x="3" y="3" width="7" height="9" /><rect x="14" y="3" width="7" height="5" /><rect x="14" y="12" width="7" height="9" /><rect x="3" y="16" width="7" height="5" /></svg>;
    case "scale": return <svg {...p}><path d="M12 3v18" /><path d="M5 8l-3 6a4 4 0 0 0 8 0L5 8Z" /><path d="M19 8l-3 6a4 4 0 0 0 8 0l-5-6Z" /><path d="M5 8h14" /></svg>;
    default: return null;
  }
}

// ---------- gráfico de barras simple (SVG, sin librerías) ----------
function SimpleBarChart({ data }) {
  const height = 260;
  const barW = 42;
  const gap = 26;
  const max = Math.max(...data.map((d) => d.kg), 1);
  const width = Math.max(600, data.length * (barW + gap) + 40);
  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg width={width} height={height}>
        {data.map((d, i) => {
          const barH = (d.kg / max) * (height - 70);
          const x = i * (barW + gap) + 30;
          const y = height - 45 - barH;
          return (
            <g key={d.codigo}>
              <rect x={x} y={y} width={barW} height={Math.max(barH, 1)} fill="#3b82f6" rx="4" />
              <text x={x + barW / 2} y={y - 6} fill="#e2e8f0" fontSize="10" textAnchor="middle">{fmtKg(d.kg)}</text>
              <text x={x + barW / 2} y={height - 28} fill="#94a3b8" fontSize="10" textAnchor="middle">{d.codigo}</text>
            </g>
          );
        })}
        <line x1="20" y1={height - 45} x2={width - 10} y2={height - 45} stroke="#1e293b" />
      </svg>
    </div>
  );
}

// ---------- atomos ----------
function Badge({ tone = "slate", children }) {
  const tones = {
    slate: "bg-slate-800 text-slate-300 border-slate-700",
    emerald: "bg-emerald-500/10 text-emerald-400 border-emerald-500/30",
    amber: "bg-amber-500/10 text-amber-400 border-amber-500/30",
    red: "bg-red-500/10 text-red-400 border-red-500/30",
    blue: "bg-blue-500/10 text-blue-400 border-blue-500/30",
  };
  return (
    <span className={cls("inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-xs font-medium", tones[tone])}>
      {children}
    </span>
  );
}

function KpiCard({ icon, label, value, sub, tone = "slate" }) {
  const iconTones = {
    slate: "text-slate-400 bg-slate-800",
    blue: "text-blue-400 bg-blue-500/10",
    emerald: "text-emerald-400 bg-emerald-500/10",
    amber: "text-amber-400 bg-amber-500/10",
  };
  return (
    <div className="rounded-xl border border-slate-800 bg-slate-900 p-4 flex items-start justify-between">
      <div>
        <p className="text-xs uppercase tracking-wide text-slate-500 font-medium">{label}</p>
        <p className="mt-1 text-2xl font-semibold text-slate-100 font-mono">{value}</p>
        {sub && <p className="mt-0.5 text-xs text-slate-500">{sub}</p>}
      </div>
      <div className={cls("rounded-lg p-2", iconTones[tone])}>
        <Icon name={icon} size={18} />
      </div>
    </div>
  );
}

function TabButton({ active, onClick, icon, children }) {
  return (
    <button
      onClick={onClick}
      className={cls(
        "flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium transition-colors whitespace-nowrap",
        active ? "bg-blue-600 text-white" : "text-slate-400 hover:text-slate-200 hover:bg-slate-800"
      )}
    >
      <Icon name={icon} size={15} />
      {children}
    </button>
  );
}

function EmptyState({ title, sub }) {
  return (
    <div className="rounded-xl border border-dashed border-slate-800 bg-slate-900/50 p-10 text-center">
      <p className="text-slate-300 font-medium">{title}</p>
      {sub && <p className="mt-1 text-sm text-slate-500">{sub}</p>}
    </div>
  );
}

// ---------- tabla Remito / Salida ----------
function RemitoTable({ tree, confirmMap, editable, onConfirmar, submitting }) {
  const [openRemitos, setOpenRemitos] = useState(new Set());
  const [openPallets, setOpenPallets] = useState(new Set());
  const [inputs, setInputs] = useState({});

  const toggleRemito = (id) =>
    setOpenRemitos((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const togglePallet = (key) =>
    setOpenPallets((s) => { const n = new Set(s); n.has(key) ? n.delete(key) : n.add(key); return n; });

  const remitosArr = useMemo(() => Array.from(tree.values()), [tree]);

  if (remitosArr.length === 0) {
    return <EmptyState title="Todavía no hay remitos cargados" sub="Importá el Excel a la pestaña correspondiente en Google Sheets." />;
  }

  return (
    <div className="rounded-xl border border-slate-800 overflow-hidden">
      <table className="w-full text-sm">
        <thead className="bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">
          <tr>
            <th className="px-3 py-2 text-left w-8"></th>
            <th className="px-3 py-2 text-left">N° Remito</th>
            <th className="px-3 py-2 text-left">Subtotal por producto</th>
            <th className="px-3 py-2 text-right">Cajas</th>
            <th className="px-3 py-2 text-right">Kg</th>
            {editable && <th className="px-3 py-2 text-left">Estado</th>}
          </tr>
        </thead>
        <tbody>
          {remitosArr.map((rem) => {
            const isOpen = openRemitos.has(rem.remito);
            const pallets = Array.from(rem.pallets.values());
            const palletsConfirmados = editable ? pallets.filter((p) => confirmMap.has(p.pallet)).length : pallets.length;
            const estado = !editable || palletsConfirmados === pallets.length ? "confirmado" : palletsConfirmados === 0 ? "pendiente" : "parcial";

            return React.createElement(React.Fragment, { key: rem.remito },
              <tr className="border-t border-slate-800 hover:bg-slate-900/60 cursor-pointer" onClick={() => toggleRemito(rem.remito)}>
                <td className="px-3 py-2 text-slate-500"><Icon name={isOpen ? "chevron-down" : "chevron-right"} size={15} /></td>
                <td className="px-3 py-2 font-mono text-slate-200">{rem.remito}</td>
                <td className="px-3 py-2 text-slate-400">
                  {Array.from(rem.productos.values()).map((p) => `${p.codigo} (${fmtInt(p.cajas)} cj / ${fmtKg(p.kg)} kg)`).join("  ·  ")}
                </td>
                <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(rem.totalCajas)}</td>
                <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtKg(rem.totalKg)}</td>
                {editable && (
                  <td className="px-3 py-2">
                    {estado === "confirmado" && <Badge tone="emerald"><Icon name="check" size={12} />Confirmado</Badge>}
                    {estado === "parcial" && <Badge tone="amber"><Icon name="clock" size={12} />Parcial ({palletsConfirmados}/{pallets.length})</Badge>}
                    {estado === "pendiente" && <Badge tone="slate"><Icon name="clock" size={12} />Pendiente</Badge>}
                  </td>
                )}
              </tr>,
              isOpen && pallets.map((pal) => {
                const key = rem.remito + "::" + pal.pallet;
                const isPalOpen = openPallets.has(key);
                const conf = confirmMap.get(pal.pallet);
                const defaults = inputs[key] || { cajas: conf ? conf.cajasRecibidas : pal.cajasEnviadas, kg: conf ? conf.kgRecibidas : pal.kgEnviados };
                return (
                  <tr key={key} className="border-t border-slate-800/60 bg-slate-950/40">
                    <td></td>
                    <td colSpan={editable ? 5 : 4} className="px-3 py-2">
                      <div className="flex items-center gap-2 cursor-pointer flex-wrap" onClick={() => togglePallet(key)}>
                        <Icon name={isPalOpen ? "chevron-down" : "chevron-right"} size={13} className="text-slate-500" />
                        <Icon name="package" size={13} className="text-slate-500" />
                        <span className="font-mono text-slate-300">{pal.pallet}</span>
                        <span className="text-slate-500 text-xs">{pal.cajasEnviadas} cajas enviadas · {fmtKg(pal.kgEnviados)} kg enviados</span>
                        {editable && conf && <span className="text-xs text-slate-500">→ recibido: {conf.cajasRecibidas} cajas / {fmtKg(conf.kgRecibidas)} kg</span>}
                        {editable && !conf && <Badge tone="slate">Sin confirmar</Badge>}
                        {editable && conf && <Badge tone="emerald"><Icon name="check" size={11} />Confirmado</Badge>}
                      </div>

                      {isPalOpen && (
                        <div className="mt-2 ml-6 space-y-2">
                          <table className="w-full text-xs">
                            <thead className="text-slate-500">
                              <tr><th className="text-left py-1">Codbar</th><th className="text-left py-1">Código</th><th className="text-right py-1">Peso caja (kg)</th></tr>
                            </thead>
                            <tbody>
                              {pal.cajas.map((c) => (
                                <tr key={c.codbar} className="border-t border-slate-900">
                                  <td className="py-1 font-mono text-slate-400">{c.codbar}</td>
                                  <td className="py-1 text-slate-400">{c.codigo}</td>
                                  <td className="py-1 text-right font-mono text-slate-400">{fmtKg(c.neto)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>

                          {editable && (
                            <div className="flex items-end gap-3 rounded-lg border border-slate-800 bg-slate-900 p-3 mt-2 flex-wrap">
                              <div>
                                <label className="block text-[11px] text-slate-500 mb-1">Cajas recibidas</label>
                                <input type="number" className="w-24 rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-slate-100 text-sm"
                                  value={defaults.cajas}
                                  onChange={(e) => setInputs((s) => ({ ...s, [key]: { ...defaults, cajas: e.target.value } }))} />
                              </div>
                              <div>
                                <label className="block text-[11px] text-slate-500 mb-1">Kg recibidos</label>
                                <input type="number" step="0.1" className="w-28 rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-slate-100 text-sm"
                                  value={defaults.kg}
                                  onChange={(e) => setInputs((s) => ({ ...s, [key]: { ...defaults, kg: e.target.value } }))} />
                              </div>
                              <button
                                disabled={submitting === pal.pallet}
                                onClick={() => onConfirmar({ pallet: pal.pallet, cajasEnviadas: pal.cajasEnviadas, kgEnviados: pal.kgEnviados, cajasRecibidas: num(defaults.cajas), kgRecibidas: num(defaults.kg) })}
                                className="rounded-md bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white text-xs font-medium px-3 py-1.5">
                                {submitting === pal.pallet ? "Guardando…" : conf ? "Actualizar confirmación" : "Confirmar arribo"}
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ---------- App ----------
function App() {
  const [data, setData] = useState(null);
  const [confirmaciones, setConfirmaciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [tab, setTab] = useState("resumen");
  const [submitting, setSubmitting] = useState(null);
  const [toast, setToast] = useState(null);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`${APPSSCRIPT_URL}?action=getAllData`);
      const json = await res.json();
      if (!json.success) throw new Error(json.error || "Error desconocido");
      setData(json.data);
      setConfirmaciones(json.data.confirmaciones || []);
      setLastUpdated(new Date());
    } catch (e) {
      setError(e.message || "No se pudo conectar con Google Sheets");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  const handleConfirmar = useCallback(async (payload) => {
    setSubmitting(payload.pallet);
    try {
      const res = await fetch(APPSSCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "confirmarArribo", ...payload }),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || "Error al guardar");
      setConfirmaciones((prev) => [
        ...prev.filter((c) => c["Pallet"] !== payload.pallet),
        { Pallet: payload.pallet, Estado: "Confirmado", "Cajas Enviadas": payload.cajasEnviadas, "Cajas Recibidas": payload.cajasRecibidas, "Kg Enviados": payload.kgEnviados, "Kg Recibidos": payload.kgRecibidas, "Fecha Confirmación": new Date().toISOString() },
      ]);
      setToast({ type: "ok", msg: `Pallet ${payload.pallet} confirmado.` });
    } catch (e) {
      setToast({ type: "error", msg: e.message || "No se pudo guardar la confirmación." });
    } finally {
      setSubmitting(null);
      setTimeout(() => setToast(null), 3500);
    }
  }, []);

  const remitoTree = useMemo(() => (data ? buildRemitoTree(data.remito) : new Map()), [data]);
  const salidaTree = useMemo(() => (data ? buildRemitoTree(data.salidas) : new Map()), [data]);
  const confirmMap = useMemo(() => buildConfirmMap(confirmaciones), [confirmaciones]);
  const coldLandMap = useMemo(() => (data ? buildColdLandMap(data.stockColdLand) : new Map()), [data]);
  const anbMap = useMemo(() => (data ? buildAnbMap(data.stockANB) : new Map()), [data]);

  const kpis = useMemo(() => {
    const palletsEnviados = new Set();
    remitoTree.forEach((rem) => rem.pallets.forEach((_, p) => palletsEnviados.add(p)));
    let confirmados = 0;
    palletsEnviados.forEach((p) => confirmMap.has(p) && confirmados++);
    const palletsSalida = new Set();
    salidaTree.forEach((rem) => rem.pallets.forEach((_, p) => palletsSalida.add(p)));
    return { enviados: palletsEnviados.size, confirmados, pendientes: palletsEnviados.size - confirmados, salidos: palletsSalida.size };
  }, [remitoTree, salidaTree, confirmMap]);

  const stockPorProducto = useMemo(() => {
    const map = new Map();
    const add = (codigo, producto, cajas, kg) => {
      const cur = map.get(codigo) || { codigo, producto, cajas: 0, kg: 0 };
      cur.cajas += cajas; cur.kg += kg;
      map.set(codigo, cur);
    };
    remitoTree.forEach((rem) => {
      rem.pallets.forEach((pal) => {
        const conf = confirmMap.get(pal.pallet);
        if (!conf) return;
        const factorCajas = pal.cajasEnviadas > 0 ? conf.cajasRecibidas / pal.cajasEnviadas : 0;
        const factorKg = pal.kgEnviados > 0 ? conf.kgRecibidas / pal.kgEnviados : 0;
        const porCodigo = new Map();
        pal.cajas.forEach((c) => {
          const cur = porCodigo.get(c.codigo) || { producto: c.producto, cajas: 0, kg: 0 };
          cur.cajas += 1; cur.kg += c.neto;
          porCodigo.set(c.codigo, cur);
        });
        porCodigo.forEach((v, codigo) => add(codigo, v.producto, v.cajas * factorCajas, v.kg * factorKg));
      });
    });
    salidaTree.forEach((rem) => rem.productos.forEach((p) => add(p.codigo, p.producto, -p.cajas, -p.kg)));
    return Array.from(map.values()).filter((r) => r.codigo).sort((a, b) => b.kg - a.kg);
  }, [remitoTree, salidaTree, confirmMap]);

  const conciliacion = useMemo(() => {
    const pallets = new Set([...anbMap.keys(), ...coldLandMap.keys()]);
    remitoTree.forEach((rem) => rem.pallets.forEach((_, p) => pallets.add(p)));
    const rows = Array.from(pallets).map((pallet) => {
      const anb = anbMap.get(pallet);
      const cold = coldLandMap.get(pallet);
      let teoricoCajas = null, teoricoKg = null;
      const conf = confirmMap.get(pallet);
      if (conf) { teoricoCajas = conf.cajasRecibidas; teoricoKg = conf.kgRecibidas; }
      salidaTree.forEach((rem) => {
        const p = rem.pallets.get(pallet);
        if (p && teoricoCajas !== null) { teoricoCajas -= p.cajasEnviadas; teoricoKg -= p.kgEnviados; }
      });
      const diffCajasPrincipal = anb && cold ? anb.cajas - cold.cajas : null;
      const diffCajasSecundario = anb && teoricoCajas !== null ? teoricoCajas - anb.cajas : null;
      const diffKgSecundario = anb && teoricoKg !== null ? teoricoKg - anb.kg : null;
      const alertas = [];
      if (diffCajasPrincipal !== null && diffCajasPrincipal !== 0) alertas.push("cajas_anb_cl");
      if (diffCajasSecundario !== null && diffCajasSecundario !== 0) alertas.push("cajas_teo_anb");
      if (diffKgSecundario !== null && Math.abs(diffKgSecundario) > KG_ALERT_THRESHOLD) alertas.push("kg_teo_anb");
      return { pallet, producto: (anb && anb.producto) || (cold && cold.producto) || "", anbCajas: anb ? anb.cajas : null, anbKg: anb ? anb.kg : null, coldCajas: cold ? cold.cajas : null, teoricoCajas, teoricoKg, diffCajasPrincipal, diffCajasSecundario, diffKgSecundario, alertas };
    });
    return rows.sort((a, b) => b.alertas.length - a.alertas.length);
  }, [anbMap, coldLandMap, remitoTree, salidaTree, confirmMap]);

  const totalAlertas = conciliacion.reduce((acc, r) => acc + r.alertas.length, 0);
  const anbCargado = (data && data.stockANB ? data.stockANB : []).length > 0;

  if (loading && !data) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-950 text-slate-400">
        <Icon name="refresh" size={18} className="animate-spin mr-2" /> Cargando datos desde Google Sheets…
      </div>
    );
  }

  if (!data) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-3 bg-slate-950 text-slate-300 p-6 text-center">
        <Icon name="alert" size={28} className="text-red-400" />
        <p className="font-medium">No se pudo cargar la información desde Google Sheets</p>
        {error && <p className="text-sm text-slate-500 max-w-md">{error}</p>}
        <button onClick={fetchAll} className="flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 px-3 py-1.5 text-sm text-slate-300 mt-2">
          <Icon name="refresh" size={14} /> Reintentar
        </button>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100">
      <div className="max-w-6xl mx-auto">
        <div className="px-5 py-4 border-b border-slate-800 flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-lg font-semibold flex items-center gap-2">
              <Icon name="warehouse" size={19} className="text-blue-400" />
              Tablero Depósitos Externos <span className="text-slate-500 font-normal">· Cold Land</span>
            </h1>
            <p className="text-xs text-slate-500 mt-0.5">{lastUpdated ? `Actualizado ${lastUpdated.toLocaleTimeString("es-AR")}` : "—"}</p>
          </div>
          <button onClick={fetchAll} disabled={loading} className="flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 px-3 py-1.5 text-sm text-slate-300">
            <Icon name="refresh" size={14} className={loading ? "animate-spin" : ""} /> Actualizar datos
          </button>
        </div>

        {error && <div className="mx-5 mt-4 rounded-lg border border-red-500/30 bg-red-500/10 text-red-400 px-3 py-2 text-sm">{error}</div>}
        {toast && (
          <div className={cls("mx-5 mt-4 rounded-lg px-3 py-2 text-sm border", toast.type === "ok" ? "border-emerald-500/30 bg-emerald-500/10 text-emerald-400" : "border-red-500/30 bg-red-500/10 text-red-400")}>
            {toast.msg}
          </div>
        )}

        <div className="px-5 pt-4 flex gap-1 overflow-x-auto border-b border-slate-800 pb-2">
          <TabButton active={tab === "resumen"} onClick={() => setTab("resumen")} icon="dashboard">Resumen</TabButton>
          <TabButton active={tab === "remitos"} onClick={() => setTab("remitos")} icon="truck">Remitos a depósito</TabButton>
          <TabButton active={tab === "salidas"} onClick={() => setTab("salidas")} icon="clipboard">Salidas a venta</TabButton>
          <TabButton active={tab === "coldland"} onClick={() => setTab("coldland")} icon="warehouse">Stock informado</TabButton>
          <TabButton active={tab === "anb"} onClick={() => setTab("anb")} icon="package">Stock propio (ANB)</TabButton>
          <TabButton active={tab === "conciliacion"} onClick={() => setTab("conciliacion")} icon="scale">
            Conciliación {totalAlertas > 0 && <Badge tone="red">{totalAlertas}</Badge>}
          </TabButton>
        </div>

        <div className="p-5">
          {tab === "resumen" && (
            <div className="space-y-6">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <KpiCard icon="truck" label="Pallets enviados" value={fmtInt(kpis.enviados)} tone="blue" />
                <KpiCard icon="check" label="Confirmados" value={fmtInt(kpis.confirmados)} sub={`${fmtInt(kpis.pendientes)} pendientes`} tone="emerald" />
                <KpiCard icon="clipboard" label="Salidos a venta" value={fmtInt(kpis.salidos)} tone="slate" />
                <KpiCard icon="alert" label="Diferencias detectadas" value={fmtInt(totalAlertas)} tone={totalAlertas > 0 ? "amber" : "slate"} />
              </div>

              {!anbCargado && (
                <div className="rounded-lg border border-amber-500/30 bg-amber-500/10 text-amber-400 text-sm px-3 py-2">
                  Todavía no cargaste "Stock ANB" — la conciliación completa estará disponible cuando lo hagas.
                </div>
              )}

              <div className="rounded-xl border border-slate-800 bg-slate-900 p-4">
                <h2 className="text-sm font-medium text-slate-300 mb-3">Stock actual por producto (kg)</h2>
                {stockPorProducto.length === 0 ? (
                  <EmptyState title="Sin stock confirmado todavía" sub="Confirmá el arribo de pallets en la pestaña Remitos para ver el stock." />
                ) : (
                  <SimpleBarChart data={stockPorProducto} />
                )}
              </div>

              <div className="rounded-xl border border-slate-800 overflow-hidden">
                <table className="w-full text-sm">
                  <thead className="bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">
                    <tr><th className="px-3 py-2 text-left">Código</th><th className="px-3 py-2 text-left">Descripción</th><th className="px-3 py-2 text-right">Cajas</th><th className="px-3 py-2 text-right">Kg</th></tr>
                  </thead>
                  <tbody>
                    {stockPorProducto.map((r) => (
                      <tr key={r.codigo} className="border-t border-slate-800">
                        <td className="px-3 py-2 font-mono text-slate-300">{r.codigo}</td>
                        <td className="px-3 py-2 text-slate-400">{r.producto}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.cajas)}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtKg(r.kg)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {tab === "remitos" && <RemitoTable tree={remitoTree} confirmMap={confirmMap} editable onConfirmar={handleConfirmar} submitting={submitting} />}
          {tab === "salidas" && <RemitoTable tree={salidaTree} confirmMap={new Map()} editable={false} />}

          {tab === "coldland" && (
            <div className="space-y-3">
              <div className="rounded-lg border border-blue-500/30 bg-blue-500/10 text-blue-400 text-sm px-3 py-2">
                Este dato es informado por el depósito externo (Cold Land) — no es un cálculo propio.
              </div>
              {data.stockColdLand.length === 0 ? (
                <EmptyState title="Sin datos de Stock Cold Land" sub="Importá el Excel del depósito a la pestaña correspondiente." />
              ) : (
                <div className="rounded-xl border border-slate-800 overflow-hidden">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">
                      <tr><th className="px-3 py-2 text-left">Etiq Azul (pallet)</th><th className="px-3 py-2 text-left">Remito</th><th className="px-3 py-2 text-right">Cantidad (cajas)</th></tr>
                    </thead>
                    <tbody>
                      {Array.from(coldLandMap.values()).map((r) => (
                        <tr key={r.pallet} className="border-t border-slate-800">
                          <td className="px-3 py-2 font-mono text-slate-300">{r.pallet}</td>
                          <td className="px-3 py-2 font-mono text-slate-400">{r.remito}</td>
                          <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.cajas)}</td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr className="border-t border-slate-700 bg-slate-900/60 font-medium">
                        <td className="px-3 py-2" colSpan={2}>Total informado por Cold Land</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-100">{fmtInt(Array.from(coldLandMap.values()).reduce((a, r) => a + r.cajas, 0))}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          )}

          {tab === "anb" && (
            <div className="space-y-3">
              {data.stockANB.length === 0 ? (
                <EmptyState title="Sin datos de Stock ANB" sub="Importá tu bajada de stock interno a la pestaña 'Stock ANB' en Google Sheets." />
              ) : (
                <div className="rounded-xl border border-slate-800 overflow-hidden">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">
                      <tr><th className="px-3 py-2 text-left">Pallet</th><th className="px-3 py-2 text-left">Código</th><th className="px-3 py-2 text-left">Descripción</th><th className="px-3 py-2 text-right">Cajas</th><th className="px-3 py-2 text-right">Kg</th></tr>
                    </thead>
                    <tbody>
                      {Array.from(anbMap.values()).map((r) => (
                        <tr key={r.pallet} className="border-t border-slate-800">
                          <td className="px-3 py-2 font-mono text-slate-300">{r.pallet}</td>
                          <td className="px-3 py-2 text-slate-400">{r.codigo}</td>
                          <td className="px-3 py-2 text-slate-400">{r.producto}</td>
                          <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.cajas)}</td>
                          <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtKg(r.kg)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {tab === "conciliacion" && (
            <div className="space-y-4">
              <div className="rounded-lg border border-slate-800 bg-slate-900 px-3 py-2 text-xs text-slate-400 space-y-1">
                <p><Badge tone="red">cajas</Badge> alerta ante cualquier diferencia · <Badge tone="amber">kg</Badge> alerta si la diferencia supera {KG_ALERT_THRESHOLD} kg</p>
                <p>Stock ANB vs Cold Land = conciliación principal (cajas). Stock teórico (recibido − salidas) vs ANB = verificación cruzada (cajas y kg).</p>
              </div>
              {!anbCargado && (
                <div className="rounded-lg border border-amber-500/30 bg-amber-500/10 text-amber-400 text-sm px-3 py-2">
                  Sin "Stock ANB" cargado, la conciliación va a mostrar guiones (—) donde falte el dato.
                </div>
              )}
              <div className="rounded-xl border border-slate-800 overflow-x-auto">
                <table className="w-full text-sm min-w-[900px]">
                  <thead className="bg-slate-900 text-slate-400 text-xs uppercase tracking-wide">
                    <tr>
                      <th className="px-3 py-2 text-left">Pallet</th><th className="px-3 py-2 text-left">Producto</th>
                      <th className="px-3 py-2 text-right">Cajas ANB</th><th className="px-3 py-2 text-right">Cajas Cold Land</th>
                      <th className="px-3 py-2 text-right">Diff (ANB−CL)</th><th className="px-3 py-2 text-right">Cajas Teórico</th>
                      <th className="px-3 py-2 text-right">Diff (Teo−ANB)</th><th className="px-3 py-2 text-right">Kg Teórico</th>
                      <th className="px-3 py-2 text-right">Kg ANB</th><th className="px-3 py-2 text-right">Diff Kg</th>
                    </tr>
                  </thead>
                  <tbody>
                    {conciliacion.map((r) => (
                      <tr key={r.pallet} className={cls("border-t border-slate-800", r.alertas.length > 0 && "bg-red-500/5")}>
                        <td className="px-3 py-2 font-mono text-slate-300">{r.pallet}</td>
                        <td className="px-3 py-2 text-slate-400">{r.producto}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.anbCajas)}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.coldCajas)}</td>
                        <td className={cls("px-3 py-2 text-right font-mono", r.diffCajasPrincipal ? "text-red-400 font-semibold" : "text-slate-500")}>{r.diffCajasPrincipal === null ? "—" : fmtInt(r.diffCajasPrincipal)}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtInt(r.teoricoCajas)}</td>
                        <td className={cls("px-3 py-2 text-right font-mono", r.diffCajasSecundario ? "text-red-400 font-semibold" : "text-slate-500")}>{r.diffCajasSecundario === null ? "—" : fmtInt(r.diffCajasSecundario)}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtKg(r.teoricoKg)}</td>
                        <td className="px-3 py-2 text-right font-mono text-slate-200">{fmtKg(r.anbKg)}</td>
                        <td className={cls("px-3 py-2 text-right font-mono", r.diffKgSecundario !== null && Math.abs(r.diffKgSecundario) > KG_ALERT_THRESHOLD ? "text-amber-400 font-semibold" : "text-slate-500")}>{r.diffKgSecundario === null ? "—" : fmtKg(r.diffKgSecundario)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
